  <text x="36" y="356" font-size="16"><tspan fill="#e23636">visitor@github</tspan><tspan fill="#6b7280">:</tspan><tspan fill="#3b82f6">~</tspan><tspan fill="#6b7280">$</tspan><tspan fill="#e8e4d8"> </tspan><tspan fill="#e23636">&#9608;</tspan></text>
