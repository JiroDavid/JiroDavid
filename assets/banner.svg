<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#1c1c1c"/>
    </pattern>
    <linearGradient id="redfade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e23636" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c1272d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="#0a0a0a"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <circle cx="1070" cy="70" r="150" fill="url(#redfade)"/>
  <circle cx="1070" cy="70" r="150" fill="none" stroke="#c1272d" stroke-opacity="0.4" stroke-width="1"/>

  <!-- perspective grid bottom -->
  <g stroke="#5a1a1a" stroke-width="1" opacity="0.7">
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="320" x2="540" y2="270"/>
    <line x1="450" y1="320" x2="600" y2="270"/>
    <line x1="700" y1="320" x2="660" y2="270"/>
    <line x1="1000" y1="320" x2="720" y2="270"/>
    <line x1="0" y1="285" x2="1200" y2="285"/>
  </g>

  <!-- corner HUD ticks -->
  <g stroke="#c1272d" stroke-width="2" fill="none">
    <path d="M24 24 h26 M24 24 v26"/>
    <path d="M1176 24 h-26 M1176 24 v26"/>
    <path d="M24 296 h26 M24 296 v-26"/>
    <path d="M1176 296 h-26 M1176 296 v-26"/>
  </g>

  <!-- top mono tag -->
  <text x="60" y="62" fill="#8a8a8a" font-size="15" letter-spacing="4" font-family="ui-monospace,'Courier New',monospace">// PERSONAL_PROJECTS &amp; JOB_HUNT</text>

  <!-- kanji accent -->
  <text x="58" y="210" fill="none" stroke="#c1272d" stroke-width="1.4" font-size="150" font-family="'Yu Gothic','Hiragino Sans','Noto Sans JP',sans-serif" font-weight="700" opacity="0.85">私</text>

  <!-- main title -->
  <text x="225" y="180" fill="#e8e4d8" font-size="118" font-weight="700" textLength="640" lengthAdjust="spacingAndGlyphs">JIRO DAVID</text>

  <!-- red bar + subtitle -->
  <rect x="227" y="212" width="58" height="10" fill="#e23636"/>
  <text x="298" y="223" fill="#e23636" font-size="22" font-weight="700" letter-spacing="7" font-family="ui-monospace,'Courier New',monospace">FULL-STACK SOFTWARE ENGINEER</text>

  <text x="227" y="262" fill="#9ca3af" font-size="16" letter-spacing="3" font-family="ui-monospace,'Courier New',monospace">building AI tools for creators and gamers</text>
</svg>
